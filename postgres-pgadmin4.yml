services:
    db:
        container_name: postgres_container
        image: postgres:14
        restart: always
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: root
            POSTGRES_DB: games
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - pg-network

    pgadmin:
        container_name: pgadmin4_container
        image: dpage/pgadmin4
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: root@root.com
            PGADMIN_DEFAULT_PASSWORD: root
        ports:
            - "8080:80"
        depends_on:
            - db
        networks:
            - pg-network

networks:
    pg-network:
        driver: bridge

volumes:
    postgres_data:
